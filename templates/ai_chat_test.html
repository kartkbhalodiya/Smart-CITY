<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maya - Smart City AI Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .chat-container {
            width: 400px;
            height: 600px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .chat-header {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .chat-header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .chat-header p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f8f9fa;
        }
        
        .message {
            margin-bottom: 15px;
            display: flex;
            align-items: flex-start;
        }
        
        .message.user {
            justify-content: flex-end;
        }
        
        .message.ai {
            justify-content: flex-start;
        }
        
        .message-content {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
        }
        
        .message.user .message-content {
            background: #007bff;
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .message.ai .message-content {
            background: white;
            color: #333;
            border: 1px solid #e0e0e0;
            border-bottom-left-radius: 4px;
        }
        
        .message-info {
            font-size: 11px;
            color: #666;
            margin-top: 5px;
            text-align: right;
        }
        
        .message.ai .message-info {
            text-align: left;
        }
        
        .chat-input {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
        }
        
        .input-group input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
        }
        
        .input-group input:focus {
            border-color: #007bff;
        }
        
        .send-btn {
            padding: 12px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }
        
        .send-btn:hover {
            background: #0056b3;
        }
        
        .send-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .typing-indicator {
            display: none;
            padding: 10px 16px;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 18px;
            margin-bottom: 15px;
            max-width: 80%;
        }
        
        .typing-dots {
            display: flex;
            gap: 4px;
        }
        
        .typing-dots span {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        
        .typing-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .typing-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-10px);
            }
        }
        
        .status-info {
            font-size: 12px;
            color: #666;
            padding: 5px 20px;
            background: #f0f0f0;
            border-top: 1px solid #e0e0e0;
        }
        
        .emotion-indicator {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            margin-left: 5px;
        }
        
        .emotion-neutral { background: #e9ecef; color: #495057; }
        .emotion-frustrated { background: #fff3cd; color: #856404; }
        .emotion-urgent { background: #f8d7da; color: #721c24; }
        .emotion-worried { background: #d1ecf1; color: #0c5460; }
        .emotion-angry { background: #f5c6cb; color: #721c24; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>🏙️ Maya</h1>
            <p>Your Smart City AI Assistant</p>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <div class="message ai">
                <div class="message-content">
                    Hello! I'm Maya, your Smart City assistant. I'm here to help you with any city-related problems. What's troubling you today?
                </div>
                <div class="message-info">Maya • Just now</div>
            </div>
        </div>
        
        <div class="typing-indicator" id="typingIndicator">
            <div class="typing-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
        
        <div class="status-info" id="statusInfo">
            Ready to help • Language: Auto-detect
        </div>
        
        <div class="chat-input">
            <div class="input-group">
                <input type="text" id="messageInput" placeholder="Type your message..." maxlength="500">
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        let sessionId = 'session_' + Date.now();
        let currentLanguage = 'english';
        let currentEmotion = 'neutral';
        
        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typingIndicator');
        const statusInfo = document.getElementById('statusInfo');
        
        // Handle Enter key
        messageInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;
            
            // Add user message to chat
            addMessage(message, 'user');
            messageInput.value = '';
            sendBtn.disabled = true;
            
            // Show typing indicator
            showTyping();
            
            try {
                const response = await fetch('/api/ai/chat/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: message,
                        session_id: sessionId,
                        user_email: null
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Update status
                    currentLanguage = data.language || 'english';
                    currentEmotion = data.emotion || 'neutral';
                    
                    // Add AI response
                    addMessage(data.response, 'ai', {
                        category: data.detected_category,
                        urgency: data.urgency,
                        emotion: data.emotion,
                        language: data.language
                    });
                    
                    // Update status info
                    updateStatus(data);
                } else {
                    addMessage('Sorry, I encountered an error. Please try again.', 'ai');
                }
            } catch (error) {
                console.error('Error:', error);
                addMessage('Sorry, I\'m having trouble connecting. Please try again.', 'ai');
            } finally {
                hideTyping();
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }
        
        function addMessage(content, sender, metadata = {}) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = content;
            
            const infoDiv = document.createElement('div');
            infoDiv.className = 'message-info';
            
            if (sender === 'user') {
                infoDiv.textContent = 'You • ' + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            } else {
                let infoText = 'Maya • ' + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                
                if (metadata.emotion && metadata.emotion !== 'neutral') {
                    const emotionSpan = document.createElement('span');
                    emotionSpan.className = `emotion-indicator emotion-${metadata.emotion}`;
                    emotionSpan.textContent = metadata.emotion;
                    infoDiv.appendChild(document.createTextNode(infoText));
                    infoDiv.appendChild(emotionSpan);
                } else {
                    infoDiv.textContent = infoText;
                }
            }
            
            messageDiv.appendChild(contentDiv);
            messageDiv.appendChild(infoDiv);
            chatMessages.appendChild(messageDiv);
            
            // Scroll to bottom
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        function showTyping() {
            typingIndicator.style.display = 'block';
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        function hideTyping() {
            typingIndicator.style.display = 'none';
        }
        
        function updateStatus(data) {
            let statusText = 'Ready to help';
            
            if (data.detected_category) {
                statusText += ` • Category: ${data.detected_category}`;
            }
            
            if (data.urgency) {
                statusText += ` • Urgency: ${data.urgency}`;
            }
            
            statusText += ` • Language: ${data.language || 'Auto-detect'}`;
            
            statusInfo.textContent = statusText;
        }
        
        // Focus on input when page loads
        window.addEventListener('load', () => {
            messageInput.focus();
        });
    </script>
</body>
</html>
