<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Register - JanHelp</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/dk1q50evg/image/upload/logo">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Leaflet Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --primary-blue: #1E66F5;
            --green-accent: #2ECC71;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: #f8fafc;
            overflow-x: hidden;
            padding: 20px 10px;
        }

        /* Background */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 0.5s ease;
        }

        /* Desktop Background */
        @media (min-width: 1025px) {
            .bg-container {
                background-image: url("https://res.cloudinary.com/dk1q50evg/image/upload/login-bg-web");
                background-color: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            }
        }

        /* Mobile Background */
        @media (max-width: 1024px) {
            .bg-container {
                background-image: url("https://res.cloudinary.com/dk1q50evg/image/upload/login-bg-mobile");
                background-color: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            }
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, rgba(30, 102, 245, 0.15) 0%, rgba(102, 126, 234, 0.12) 50%, rgba(118, 75, 162, 0.08) 100%);
        }

        .container {
            max-width: 480px;
            width: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 50px rgba(30, 102, 245, 0.15), 0 0 100px rgba(30, 102, 245, 0.05);
            padding: 30px 25px;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo-img {
            max-width: 160px;
            height: auto;
            margin-bottom: 8px;
        }

        .brand-subtitle {
            color: var(--primary-blue);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 6px;
            font-family: 'Poppins', sans-serif;
        }

        .header h1 {
            font-family: 'Poppins', sans-serif;
            color: var(--text-dark);
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 0;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            color: var(--text-dark);
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 11px 14px 11px 40px;
            background: rgba(255, 255, 255, 0.9);
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            color: var(--text-dark);
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary-blue);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(30, 102, 245, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 70px;
            padding-left: 14px;
        }

        .form-group select {
            padding-left: 14px;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 14px;
            pointer-events: none;
        }

        .input-wrapper {
            position: relative;
        }

        .location-section {
            margin-bottom: 14px;
        }

        .location-title {
            color: var(--text-dark);
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .location-buttons {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        .location-divider {
            text-align: center;
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 600;
            margin: 10px 0;
        }

        .btn {
            flex: 1;
            padding: 11px;
            background: linear-gradient(135deg, var(--primary-blue) 0%, #154ec7 100%);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-family: 'Poppins', sans-serif;
            box-shadow: 0 8px 16px rgba(30, 102, 245, 0.2);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 20px rgba(30, 102, 245, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: linear-gradient(135deg, var(--green-accent) 0%, #27ae60 100%);
            box-shadow: 0 8px 16px rgba(46, 204, 113, 0.2);
        }

        .btn-secondary:hover {
            box-shadow: 0 12px 20px rgba(46, 204, 113, 0.3);
        }

        .btn-full {
            width: 100%;
            margin-top: 6px;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
        }

        .footer p {
            color: var(--text-muted);
            font-size: 12px;
            margin-bottom: 6px;
        }

        .footer a {
            color: var(--primary-blue);
            font-weight: 600;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .guest-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 12px;
            padding: 10px;
            background: #fff;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            color: var(--text-dark);
            font-size: 12px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
        }

        .guest-link:hover {
            border-color: var(--primary-blue);
            color: var(--primary-blue);
        }

        .alert {
            padding: 10px 14px;
            border-radius: 10px;
            margin-bottom: 16px;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .alert-success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        #locationDisplay {
            padding: 10px;
            background: rgba(30, 102, 245, 0.1);
            border-radius: 10px;
            font-size: 12px;
            color: var(--text-dark);
            display: none;
            margin-top: 10px;
        }

        #mapContainer {
            display: none;
            margin-top: 10px;
        }

        #map {
            height: 250px;
            border-radius: 12px;
            border: 1.5px solid #e2e8f0;
        }

        @media (max-width: 480px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 24px 18px;
            }

            .header h1 {
                font-size: 20px;
            }

            .location-buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="bg-container"></div>
    <div class="bg-overlay"></div>
    
    <script src="/static/js/translations.js"></script>
    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <div class="header">
            <img src="https://res.cloudinary.com/dk1q50evg/image/upload/logo" alt="JanHelp Logo" class="logo-img" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
            <div style="display:none; font-size: 40px; margin-bottom: 8px;">🏛️</div>
            <p class="brand-subtitle">Complaint Management System</p>
            <h1>Create Account</h1>
        </div>
        
        <form method="post">
            {% csrf_token %}
            
            <div class="form-row">
                <div class="form-group">
                    <label><i class="fa-solid fa-user"></i> First Name</label>
                    <div class="input-wrapper">
                        <input type="text" name="name" placeholder="John" required style="padding-left: 14px;">
                    </div>
                </div>
                <div class="form-group">
                    <label><i class="fa-solid fa-user"></i> Last Name</label>
                    <div class="input-wrapper">
                        <input type="text" name="surname" placeholder="Doe" required style="padding-left: 14px;">
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label><i class="fa-solid fa-phone"></i> Mobile Number</label>
                <div class="input-wrapper">
                    <input type="tel" name="mobile_no" placeholder="+91 98765 43210" required style="padding-left: 14px;">
                </div>
            </div>

            <div class="form-group">
                <label><i class="fa-solid fa-envelope"></i> Email Address</label>
                <div class="input-wrapper">
                    <input type="email" name="email" placeholder="john@example.com" required style="padding-left: 14px;">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label><i class="fa-solid fa-map"></i> State</label>
                    <select name="state" id="state" required>
                        <option value="">Select State</option>
                    <option value="Maharashtra">Maharashtra</option>
                    <option value="Gujarat">Gujarat</option>
                    <option value="Karnataka">Karnataka</option>
                    <option value="Tamil Nadu">Tamil Nadu</option>
                    <option value="Rajasthan">Rajasthan</option>
                    <option value="Uttar Pradesh">Uttar Pradesh</option>
                    <option value="Madhya Pradesh">Madhya Pradesh</option>
                    <option value="West Bengal">West Bengal</option>
                    <option value="Bihar">Bihar</option>
                    <option value="Andhra Pradesh">Andhra Pradesh</option>
                    <option value="Telangana">Telangana</option>
                    <option value="Kerala">Kerala</option>
                    <option value="Punjab">Punjab</option>
                    <option value="Haryana">Haryana</option>
                    <option value="Delhi">Delhi</option>
                    <option value="Jharkhand">Jharkhand</option>
                    <option value="Assam">Assam</option>
                    <option value="Odisha">Odisha</option>
                    <option value="Chhattisgarh">Chhattisgarh</option>
                    <option value="Uttarakhand">Uttarakhand</option>
                    <option value="Himachal Pradesh">Himachal Pradesh</option>
                    <option value="Jammu and Kashmir">Jammu and Kashmir</option>
                    <option value="Goa">Goa</option>
                    </select>
                </div>
                <div class="form-group">
                    <label><i class="fa-solid fa-city"></i> City</label>
                    <select name="district" id="district" required>
                        <option value="">Select City</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label><i class="fa-solid fa-location-dot"></i> Address</label>
                <textarea name="address" placeholder="House no, Street, Landmark..." required></textarea>
            </div>

            <div class="form-group">
                <label><i class="fa-solid fa-id-card"></i> Aadhaar Number (Optional)</label>
                <div class="input-wrapper">
                    <input type="text" name="aadhaar" placeholder="1234 5678 9012" maxlength="14" style="padding-left: 14px;">
                </div>
            </div>

            <div class="location-section">
                <div class="location-title"><i class="fa-solid fa-location-crosshairs"></i> Location (GPS)</div>
                <div class="location-buttons">
                    <button type="button" class="btn" onclick="getCurrentLocation()" id="detectLocationBtn">
                        <i class="fa-solid fa-location-arrow"></i>
                        <span>Detect Current Location</span>
                    </button>
                </div>
                <div class="location-divider">OR</div>
                <button type="button" class="btn btn-secondary" onclick="openMap()" style="width: 100%;" id="pickMapBtn">
                    <i class="fa-solid fa-map-marked-alt"></i>
                    <span>Pick Location on Map</span>
                </button>
                <input type="hidden" name="latitude" id="latitude" required>
                <input type="hidden" name="longitude" id="longitude" required>
                <div id="locationDisplay">
                    <i class="fa-solid fa-map-pin"></i> <span id="locationText"></span>
                </div>
                <div id="locationError" style="display: none; padding: 10px; background: rgba(239, 68, 68, 0.1); border-radius: 10px; font-size: 12px; color: #dc2626; margin-top: 10px;">
                    <i class="fa-solid fa-exclamation-triangle"></i> <span id="locationErrorText"></span>
                </div>
            </div>

            <div id="mapContainer">
                <div id="mapLoading" style="display: none; text-align: center; padding: 40px; background: rgba(30, 102, 245, 0.05); border-radius: 12px; margin-bottom: 10px;">
                    <div style="display: inline-block; width: 40px; height: 40px; border: 4px solid rgba(30, 102, 245, 0.2); border-top-color: var(--primary-blue); border-radius: 50%; animation: spin 1s linear infinite;"></div>
                    <p style="margin-top: 15px; color: var(--primary-blue); font-weight: 600;">Loading map...</p>
                </div>
                <div id="map"></div>
                <button type="button" class="btn btn-full" onclick="confirmLocation()">
                    <i class="fa-solid fa-check"></i> Confirm Location
                </button>
            </div>

            <style>
                @keyframes spin {
                    to { transform: rotate(360deg); }
                }
            </style>
            
            <button type="submit" class="btn btn-full">
                <i class="fa-solid fa-user-plus"></i>
                Register Now
            </button>
        </form>
        
        <div class="footer">
            <p>Already have account? <a href="{% url 'login' %}">Login</a></p>
            <a href="{% url 'track_guest_complaint' %}" class="guest-link">
                <i class="fa-solid fa-magnifying-glass"></i>
                Track Complaint as Guest
            </a>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map, marker;
        
        function initMap(lat, lng) {
            if (map) {
                map.remove();
            }
            map = L.map('map').setView([lat, lng], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);
            
            marker = L.marker([lat, lng], { draggable: true }).addTo(map);
            
            marker.on('dragend', function(e) {
                const pos = marker.getLatLng();
                document.getElementById('latitude').value = pos.lat;
                document.getElementById('longitude').value = pos.lng;
            });
            
            map.on('click', function(e) {
                marker.setLatLng(e.latlng);
                document.getElementById('latitude').value = e.latlng.lat;
                document.getElementById('longitude').value = e.latlng.lng;
            });
        }
        const stateSelect = document.getElementById('state');
        const districtSelect = document.getElementById('district');

        // Build city data from Django context - only cities added by admin
        const cityData = {};
        {% for city in cities %}
        const stateName = '{{ city.state.name }}';
        if (!cityData[stateName]) {
            cityData[stateName] = [];
        }
        cityData[stateName].push('{{ city.name }}');
        {% endfor %}

        stateSelect.addEventListener('change', function() {
            const state = this.value;
            districtSelect.innerHTML = '<option value="">Select City</option>';
            
            if (state && cityData[state]) {
                cityData[state].forEach(city => {
                    const option = document.createElement('option');
                    option.value = city;
                    option.textContent = city;
                    districtSelect.appendChild(option);
                });
            } else if (state) {
                // No cities added for this state yet
                const option = document.createElement('option');
                option.value = '';
                option.textContent = 'No cities available for this state';
                option.disabled = true;
                districtSelect.appendChild(option);
            }
        });

        function getCurrentLocation() {
            const detectBtn = document.getElementById('detectLocationBtn');
            const btnText = detectBtn.querySelector('span');
            const btnIcon = detectBtn.querySelector('i');
            const errorDiv = document.getElementById('locationError');
            const errorText = document.getElementById('locationErrorText');
            
            // Show loading state
            btnText.textContent = 'Detecting...';
            btnIcon.className = 'fa-solid fa-spinner fa-spin';
            detectBtn.disabled = true;
            errorDiv.style.display = 'none';
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lng = position.coords.longitude;
                        document.getElementById('latitude').value = lat;
                        document.getElementById('longitude').value = lng;
                        document.getElementById('locationDisplay').style.display = 'block';
                        document.getElementById('locationText').textContent = `Lat: ${lat.toFixed(6)}, Lng: ${lng.toFixed(6)}`;
                        
                        // Reset button
                        btnText.textContent = 'Location Detected ✓';
                        btnIcon.className = 'fa-solid fa-check';
                        detectBtn.disabled = false;
                        
                        // Auto-open map
                        setTimeout(() => {
                            document.getElementById('mapContainer').style.display = 'block';
                            document.getElementById('mapLoading').style.display = 'block';
                            if (!map) {
                                setTimeout(() => {
                                    initMap(lat, lng);
                                    document.getElementById('mapLoading').style.display = 'none';
                                }, 500);
                            } else {
                                map.setView([lat, lng], 13);
                                marker.setLatLng([lat, lng]);
                                document.getElementById('mapLoading').style.display = 'none';
                            }
                        }, 300);
                    },
                    (error) => {
                        // Reset button
                        btnText.textContent = 'Detect Current Location';
                        btnIcon.className = 'fa-solid fa-location-arrow';
                        detectBtn.disabled = false;
                        
                        // Show error
                        errorDiv.style.display = 'block';
                        if (error.code === error.PERMISSION_DENIED) {
                            errorText.textContent = 'Location permission denied. Please enable location access or use "Pick Location on Map".';
                        } else if (error.code === error.POSITION_UNAVAILABLE) {
                            errorText.textContent = 'Location unavailable. Please try "Pick Location on Map".';
                        } else if (error.code === error.TIMEOUT) {
                            errorText.textContent = 'Location request timeout. Please try again or use "Pick Location on Map".';
                        } else {
                            errorText.textContent = 'Unable to get location. Please use "Pick Location on Map".';
                        }
                    },
                    {
                        enableHighAccuracy: true,
                        timeout: 10000,
                        maximumAge: 0
                    }
                );
            } else {
                btnText.textContent = 'Detect Current Location';
                btnIcon.className = 'fa-solid fa-location-arrow';
                detectBtn.disabled = false;
                errorDiv.style.display = 'block';
                errorText.textContent = 'Geolocation is not supported by your browser. Please use "Pick Location on Map".';
            }
        }

        function openMap() {
            const pickBtn = document.getElementById('pickMapBtn');
            const btnText = pickBtn.querySelector('span');
            const btnIcon = pickBtn.querySelector('i');
            const errorDiv = document.getElementById('locationError');
            
            errorDiv.style.display = 'none';
            document.getElementById('mapContainer').style.display = 'block';
            document.getElementById('mapLoading').style.display = 'block';
            
            // Try to get user location first
            if (navigator.geolocation) {
                btnText.textContent = 'Getting your location...';
                btnIcon.className = 'fa-solid fa-spinner fa-spin';
                pickBtn.disabled = true;
                
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lng = position.coords.longitude;
                        
                        if (!map) {
                            setTimeout(() => {
                                initMap(lat, lng);
                                document.getElementById('latitude').value = lat;
                                document.getElementById('longitude').value = lng;
                                document.getElementById('mapLoading').style.display = 'none';
                                btnText.textContent = 'Pick Location on Map';
                                btnIcon.className = 'fa-solid fa-map-marked-alt';
                                pickBtn.disabled = false;
                            }, 500);
                        } else {
                            map.setView([lat, lng], 13);
                            marker.setLatLng([lat, lng]);
                            document.getElementById('latitude').value = lat;
                            document.getElementById('longitude').value = lng;
                            document.getElementById('mapLoading').style.display = 'none';
                            btnText.textContent = 'Pick Location on Map';
                            btnIcon.className = 'fa-solid fa-map-marked-alt';
                            pickBtn.disabled = false;
                        }
                    },
                    (error) => {
                        // Fallback to default location (India center)
                        const defaultLat = 20.5937;
                        const defaultLng = 78.9629;
                        
                        if (!map) {
                            setTimeout(() => {
                                initMap(defaultLat, defaultLng);
                                document.getElementById('mapLoading').style.display = 'none';
                                btnText.textContent = 'Pick Location on Map';
                                btnIcon.className = 'fa-solid fa-map-marked-alt';
                                pickBtn.disabled = false;
                            }, 500);
                        } else {
                            map.setView([defaultLat, defaultLng], 5);
                            marker.setLatLng([defaultLat, defaultLng]);
                            document.getElementById('mapLoading').style.display = 'none';
                            btnText.textContent = 'Pick Location on Map';
                            btnIcon.className = 'fa-solid fa-map-marked-alt';
                            pickBtn.disabled = false;
                        }
                    },
                    {
                        enableHighAccuracy: true,
                        timeout: 5000,
                        maximumAge: 0
                    }
                );
            } else {
                // No geolocation support, use default location
                const defaultLat = 20.5937;
                const defaultLng = 78.9629;
                
                if (!map) {
                    setTimeout(() => {
                        initMap(defaultLat, defaultLng);
                        document.getElementById('mapLoading').style.display = 'none';
                    }, 500);
                } else {
                    map.setView([defaultLat, defaultLng], 5);
                    marker.setLatLng([defaultLat, defaultLng]);
                    document.getElementById('mapLoading').style.display = 'none';
                }
            }
        }

        function confirmLocation() {
            const lat = document.getElementById('latitude').value;
            const lng = document.getElementById('longitude').value;
            
            if (lat && lng) {
                document.getElementById('locationDisplay').style.display = 'block';
                document.getElementById('locationText').textContent = `Lat: ${parseFloat(lat).toFixed(6)}, Lng: ${parseFloat(lng).toFixed(6)}`;
                document.getElementById('mapContainer').style.display = 'none';
                document.getElementById('locationError').style.display = 'none';
                
                // Update button states
                const detectBtn = document.getElementById('detectLocationBtn');
                const pickBtn = document.getElementById('pickMapBtn');
                detectBtn.querySelector('span').textContent = 'Location Set ✓';
                detectBtn.querySelector('i').className = 'fa-solid fa-check';
                pickBtn.querySelector('span').textContent = 'Location Set ✓';
                pickBtn.querySelector('i').className = 'fa-solid fa-check';
            } else {
                const errorDiv = document.getElementById('locationError');
                const errorText = document.getElementById('locationErrorText');
                errorDiv.style.display = 'block';
                errorText.textContent = 'Please select a location on the map by clicking.';
            }
        }
    </script>
