<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complaint Location - Smart City</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: #f5f7fa;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .complaint-info {
            background: #fff;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        #map {
            height: 500px;
            width: 100%;
            border-radius: 15px;
            border: 1px solid #dee2e6;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 8px 15px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fa-solid fa-map-marked-alt"></i> Complaint Location</h1>
            <a href="javascript:history.back()" class="back-btn">
                <i class="fa-solid fa-arrow-left"></i> Back
            </a>
        </div>

        <div class="complaint-info">
            <h3>{{ complaint.complaint_number }} - {{ complaint.title }}</h3>
            <p><strong>Type:</strong> {{ complaint.get_complaint_type_display }}</p>
            <p><strong>Status:</strong> {{ complaint.get_work_status_display }}</p>
            <p><strong>Address:</strong> {{ complaint.address }}</p>
            <p><strong>Coordinates:</strong> {{ complaint.latitude }}, {{ complaint.longitude }}</p>
        </div>

        <div id="map"></div>
    </div>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            initMap();
        });

        function initMap() {
            const lat = {{ complaint.latitude }};
            const lng = {{ complaint.longitude }};
            
            if (!lat || !lng) return;

            const map = L.map('map').setView([lat, lng], 16);
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);
            
            L.marker([lat, lng]).addTo(map)
                .bindPopup('<b>{{ complaint.complaint_number }}</b><br>{{ complaint.title }}')
                .openPopup();
        }
    </script>
</body>
</html>
