<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}JanHelp Notification{% endblock %}</title>
</head>
<body style="margin: 0; padding: 0; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background-color: #f1f5f9; line-height: 1.6;">
    <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: #f1f5f9; padding: 30px 15px;">
        <tr>
            <td align="center">
                <table width="600" cellpadding="0" cellspacing="0" border="0" style="max-width: 600px; width: 100%; background-color: #ffffff; border-radius: 16px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08); overflow: hidden;">
                    <!-- Header -->
                    <tr>
                        <td style="background-color: #ffffff; padding: 25px 20px; text-align: center; border-bottom: 1px solid #f1f5f9;">
                            <!-- Logo -->
                            <table width="100%" cellpadding="0" cellspacing="0" border="0">
                                <tr>
                                    <td align="center">
                                        <img src="https://res.cloudinary.com/dk1q50evg/image/upload/logo" alt="JanHelp Logo" style="width: 80px; height: 80px; display: block;" />
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                    
                    <!-- Body -->
                    <tr>
                        <td style="padding: 30px 25px; color: #1e293b; background-color: #ffffff;">
                            {% block content %}{% endblock %}
                        </td>
                    </tr>
                    
                    <!-- Footer -->
                    <tr>
                        <td style="background-color: #f8fafc; padding: 30px 20px; text-align: center; border-top: 1px solid #f1f5f9;">
                            <div style="margin-bottom: 20px;">
                                <a href="{{ base_url }}" style="color: #1E66F5; text-decoration: none; margin: 0 10px; font-weight: 600; font-size: 13px;">Home</a>
                                <a href="{{ base_url }}/track" style="color: #1E66F5; text-decoration: none; margin: 0 10px; font-weight: 600; font-size: 13px;">Track</a>
                                <a href="{{ base_url }}/help" style="color: #1E66F5; text-decoration: none; margin: 0 10px; font-weight: 600; font-size: 13px;">Help</a>
                            </div>
                            
                            <p style="font-size: 12px; color: #64748b; margin-top: 15px; font-family: 'Inter', sans-serif; line-height: 1.5;">
                                © 2024 **JanHelp**. Making cities smarter.<br>
                                Designed by <span style="color: #1E66F5; font-weight: 600;">Kartik Bhalodiya</span>
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
