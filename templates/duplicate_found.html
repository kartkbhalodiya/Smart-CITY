<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complaint Already Submitted - Smart City</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .success-card {
            background: #ffffff;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            max-width: 450px;
            width: 100%;
            text-align: center;
        }

        .icon-box {
            width: 80px;
            height: 80px;
            background: #fef3c7;
            color: #d97706;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 24px;
            font-size: 36px;
        }

        h1 {
            font-size: 20px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 12px;
        }

        p {
            font-size: 15px;
            color: #6b7280;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .ticket-id {
            background: #f3f4f6;
            padding: 8px 16px;
            border-radius: 8px;
            font-family: monospace;
            font-weight: 700;
            color: #374151;
            font-size: 18px;
            letter-spacing: 2px;
        }

        .btn-thank-you {
            display: block;
            width: 100%;
            padding: 16px;
            background: #10b981;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 15px;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
            margin-bottom: 12px;
        }

        .btn-bypass {
            display: block;
            width: 100%;
            padding: 16px;
            background: #fff;
            color: #4b5563;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
            border: 1px solid #d1d5db;
            cursor: pointer;
        }

        .btn-thank-you:hover {
            background: #059669;
            transform: translateY(-2px);
        }

        .btn-bypass:hover {
            background: #f9fafb;
            border-color: #9ca3af;
        }

        .btn-thank-you:active, .btn-bypass:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="success-card">
        <div class="icon-box">
            <i class="fa-solid fa-circle-check"></i>
        </div>
        <h1>Thank You for Applied Complaint!</h1>
        <p>This issue has already been reported by another citizen in this area. Our team is already working on it.</p>
        
        <div style="margin-bottom: 30px;">
            <div style="font-size: 12px; text-transform: uppercase; color: #9ca3af; margin-bottom: 8px;">Existing Ticket ID</div>
            <span class="ticket-id">{{ masked_id }}</span>
        </div>

        <a href="{% url 'user_dashboard' %}" class="btn-thank-you">Thank You</a>
        
        <form action="{% url 'preview_complaint' %}" method="post">
            {% csrf_token %}
            <input type="hidden" name="confirm" value="true">
            <input type="hidden" name="bypass_duplicate" value="true">
            <button type="submit" class="btn-bypass">No, my issue is different</button>
        </form>
    </div>
</body>
</html>
