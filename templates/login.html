<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - JanHelp</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://janhelp.vercel.app/static/images/favicon.png">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-blue: #1E66F5;
            --green-accent: #2ECC71;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: #f8fafc;
            overflow-x: hidden;
        }

        /* Responsive Background Image */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 0.5s ease;
        }

        /* Desktop Background */
        @media (min-width: 1025px) {
            .bg-container {
                background-image: url('https://janhelp.vercel.app/static/images/login-bg-web.jpg');
            }
        }

        /* Mobile Background (9:16 aspect ratio focus) */
        @media (max-width: 1024px) {
            .bg-container {
                background-image: url('https://janhelp.vercel.app/static/images/login-bg-mobile.jpg');
            }
        }

        /* Overlay to enhance warm sunrise lighting */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, rgba(30, 102, 245, 0.1) 0%, rgba(255, 145, 0, 0.1) 100%);
        }

        .login-wrapper {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
            padding: 40px;
            width: 100%;
            max-width: 440px;
            text-align: center;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .logo-container {
            margin-bottom: 24px;
        }

        .logo-img {
            max-width: 200px;
            height: auto;
            margin-bottom: 12px;
        }

        .brand-subtitle {
            color: var(--primary-blue);
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            font-family: 'Poppins', sans-serif;
        }

        .heading {
            font-family: 'Poppins', sans-serif;
            font-size: 26px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 32px;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
            text-align: left;
        }

        .input-group label {
            display: none; /* Screen reader only */
        }

        .input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 18px;
            transition: color 0.3s;
        }

        .input-field {
            width: 100%;
            padding: 16px 16px 16px 52px;
            background: rgba(255, 255, 255, 0.9);
            border: 1.5px solid #e2e8f0;
            border-radius: 14px;
            color: var(--text-dark);
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary-blue);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(30, 102, 245, 0.1);
        }

        .input-field:focus + .input-icon {
            color: var(--primary-blue);
        }

        .options-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            cursor: pointer;
            font-weight: 500;
        }

        .custom-checkbox {
            width: 18px;
            height: 18px;
            border-radius: 5px;
            accent-color: var(--primary-blue);
        }

        .forgot-link {
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .forgot-link:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #1E66F5 0%, #154ec7 100%);
            color: #ffffff;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
            font-family: 'Poppins', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 10px 20px rgba(30, 102, 245, 0.2);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(30, 102, 245, 0.3);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .guest-track-container {
            border-top: 1px solid rgba(0, 0, 0, 0.05);
            padding-top: 24px;
            margin-top: 10px;
        }

        .btn-guest {
            width: 100%;
            padding: 14px;
            background: #fff;
            color: var(--text-dark);
            border: 1.5px solid #e2e8f0;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
        }

        .btn-guest:hover {
            background: #f8fafc;
            border-color: var(--primary-blue);
            color: var(--primary-blue);
        }

        .footer {
            margin-top: 40px;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 500;
        }

        .footer strong {
            color: var(--text-dark);
            font-weight: 700;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 24px;
            font-size: 14px;
            font-weight: 600;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .alert-success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        /* Mobile Specific Layout (9:16) */
        @media (max-width: 480px) {
            .glass-card {
                padding: 32px 24px;
                border-radius: 30px 30px 0 0;
                position: fixed;
                bottom: 0;
                max-width: 100%;
                margin: 0;
            }
            
            .login-wrapper {
                align-items: flex-end;
                padding: 0;
            }

            .heading {
                font-size: 24px;
                margin-bottom: 24px;
            }
        }
        
        .admin-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 8px 16px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(5px);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            z-index: 100;
        }
        
        .admin-badge:hover {
            background: #0f172a;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="bg-container"></div>
    <div class="bg-overlay"></div>

    <a href="/admin" class="admin-badge">
        <i class="fa-solid fa-shield-check"></i> ADMIN
    </a>

    <div class="login-wrapper">
        <div class="glass-card">
            <!-- Messages -->
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }}">
                        <i class="fa-solid fa-circle-{{ 'check' if message.tags == 'success' else 'exclamation' }}"></i>
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <!-- Header -->
            <div class="logo-container">
                <img src="https://janhelp.vercel.app/static/images/logo.png" alt="JanHelp Logo" class="logo-img">
                <p class="brand-subtitle">Complaint Management System</p>
                <h2 class="heading">Login to Your Account</h2>
            </div>

            <!-- Login Form -->
            <form method="post">
                {% csrf_token %}
                <div class="input-group">
                    <input type="text" name="identifier" class="input-field" placeholder="Email / Mobile Number" required autocomplete="username">
                    <i class="fa-solid fa-user input-icon"></i>
                </div>

                <div class="input-group">
                    <input type="password" name="password" class="input-field" placeholder="Password" autocomplete="current-password">
                    <i class="fa-solid fa-lock input-icon"></i>
                </div>

                <div class="options-row">
                    <label class="remember-me">
                        <input type="checkbox" name="remember" class="custom-checkbox">
                        Remember Me
                    </label>
                    <a href="{% url 'forgot_password' %}" class="forgot-link">Forgot Password?</a>
                </div>

                <button type="submit" class="btn-login">Login</button>
            </form>

            <!-- Guest & Track -->
            <div class="guest-track-container">
                <a href="{% url 'track_guest_complaint' %}" class="btn-guest">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    Track Complaint as Guest
                </a>
                
                <p style="margin-top: 20px; font-size: 13px; color: var(--text-muted);">
                    Don't have an account? <a href="{% url 'register' %}" style="color: var(--primary-blue); font-weight: 600; text-decoration: none;">Register Now</a>
                </p>
            </div>

            <!-- Footer -->
            <div class="footer">
                Powered by <strong>Kanak Infosystems LLP.</strong>
            </div>
        </div>
    </div>

    <!-- Google Translate (Hidden but functional) -->
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <div id="google_translate_element" style="display:none;"></div>
    <script>
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'hi,gu,en',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
                autoDisplay: false
            }, 'google_translate_element');
        }
    </script>
</body>
</html>
