{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - JanHelp</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://res.cloudinary.com/dk1q50evg/image/upload/logo">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-blue: #1E66F5;
            --green-accent: #2ECC71;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: #f8fafc;
            overflow: hidden;
        }

        /* Responsive Background Image */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 0.5s ease;
            filter: blur(8px);
            -webkit-filter: blur(8px);
        }

        /* Desktop Background */
        @media (min-width: 1025px) {
            .bg-container {
                background-image: url("https://res.cloudinary.com/dk1q50evg/image/upload/login-bg-web");
                background-color: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            }
        }

        /* Mobile Background (9:16 aspect ratio focus) */
        @media (max-width: 1024px) {
            .bg-container {
                background-image: url("https://res.cloudinary.com/dk1q50evg/image/upload/login-bg-mobile");
                background-color: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            }
        }

        /* Overlay to enhance warm sunrise lighting */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, rgba(30, 102, 245, 0.2) 0%, rgba(102, 126, 234, 0.15) 50%, rgba(118, 75, 162, 0.1) 100%);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .login-wrapper {
            width: 100%;
            max-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 50px rgba(30, 102, 245, 0.15), 0 0 100px rgba(30, 102, 245, 0.05);
            padding: 30px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            margin: auto;
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .logo-container {
            margin-bottom: 16px;
        }

        .logo-img {
            max-width: 160px;
            height: auto;
            margin-bottom: 8px;
        }

        .brand-subtitle {
            color: var(--primary-blue);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin-bottom: 6px;
            font-family: 'Poppins', sans-serif;
        }

        .heading {
            font-family: 'Poppins', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 12px;
            position: relative;
            text-align: left;
        }

        .input-group label {
            display: none; /* Screen reader only */
        }

        .password-toggle {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 16px;
            cursor: pointer;
            transition: color 0.3s;
            z-index: 10;
        }

        .password-toggle:hover {
            color: var(--primary-blue);
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 16px;
            transition: color 0.3s;
        }

        .input-field {
            width: 100%;
            padding: 12px 14px 12px 46px;
            background: rgba(255, 255, 255, 0.9);
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            color: var(--text-dark);
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary-blue);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(30, 102, 245, 0.1);
        }

        .input-field:focus + .input-icon {
            color: var(--primary-blue);
        }

        .options-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            font-size: 12px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            cursor: pointer;
            font-weight: 500;
        }

        .custom-checkbox {
            width: 16px;
            height: 16px;
            border-radius: 4px;
            accent-color: var(--primary-blue);
        }

        .forgot-link {
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .forgot-link:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #1E66F5 0%, #154ec7 100%);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 12px;
            font-family: 'Poppins', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 8px 16px rgba(30, 102, 245, 0.2);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(30, 102, 245, 0.3);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .guest-track-container {
            border-top: 1px solid rgba(0, 0, 0, 0.05);
            padding-top: 16px;
            margin-top: 6px;
            display: flex;
            gap: 8px;
        }

        .btn-guest {
            flex: 1;
            padding: 10px;
            background: #fff;
            color: var(--text-dark);
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            text-decoration: none;
        }

        .btn-guest:hover {
            background: #f8fafc;
            border-color: var(--primary-blue);
            color: var(--primary-blue);
        }

        .footer {
            margin-top: 16px;
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 500;
        }

        .footer strong {
            color: var(--text-dark);
            font-weight: 700;
        }

        .alert {
            padding: 10px 14px;
            border-radius: 10px;
            margin-bottom: 16px;
            font-size: 13px;
            font-weight: 600;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .alert-success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        /* Mobile Specific Layout (9:16) */
        @media (max-width: 480px) {
            .glass-card {
                padding: 28px 22px;
                border-radius: 18px;
                max-width: 360px;
            }
            
            .login-wrapper {
                align-items: center;
                padding: 15px;
            }

            .heading {
                font-size: 18px;
                margin-bottom: 16px;
            }
            
            .guest-track-container {
                flex-direction: column;
                gap: 6px;
            }
            
            .btn-guest {
                width: 100%;
            }
            
            .footer {
                font-size: 10px;
            }
        }
        

    </style>
</head>
<body>
    <div class="bg-container"></div>
    <div class="bg-overlay"></div>

    <div class="login-wrapper">
        <div class="glass-card">
            <!-- Messages -->
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }}">
                        <i class="fa-solid fa-circle-{% if message.tags == 'success' %}check{% else %}exclamation{% endif %}"></i>
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <!-- Header -->
            <div class="logo-container">
                <img src="https://res.cloudinary.com/dk1q50evg/image/upload/logo" alt="JanHelp Logo" class="logo-img" onerror="this.innerHTML='<div style=font-size:48px>🏛️</div><h1 style=font-size:32px;font-weight:800;color:var(--primary-blue);margin-bottom:8px;font-family:Poppins,sans-serif>JanHelp</h1>'">
                <p class="brand-subtitle">Complaint Management System</p>
                <h2 class="heading">Login to Your Account</h2>
            </div>

            <!-- Login Form -->
            <form method="post">
                {% csrf_token %}
                <div class="input-group">
                    <input type="text" name="identifier" class="input-field" placeholder="Email / Mobile Number" required autocomplete="username">
                    <i class="fa-solid fa-user input-icon"></i>
                </div>

                <div class="input-group">
                    <input type="password" name="password" id="password" class="input-field" placeholder="Password" autocomplete="current-password">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <i class="fa-solid fa-eye password-toggle" id="togglePassword" onclick="togglePasswordVisibility()"></i>
                </div>

                <div class="options-row">
                    <label class="remember-me">
                        <input type="checkbox" name="remember" class="custom-checkbox">
                        Remember Me
                    </label>
                    <a href="{% url 'forgot_password' %}" class="forgot-link">Forgot Password?</a>
                </div>

                <button type="submit" class="btn-login">Login</button>
            </form>

            <!-- Guest & Track -->
            <div class="guest-track-container">
                <a href="https://janhelp.vercel.app/dashboard/?guest=true" class="btn-guest">
                    <i class="fa-solid fa-user"></i>
                    Guest
                </a>
                <a href="{% url 'track_guest_complaint' %}" class="btn-guest">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    Track
                </a>
            </div>
                
            <p style="margin-top: 12px; font-size: 12px; color: var(--text-muted);">
                Don't have an account? <a href="{% url 'register' %}" style="color: var(--primary-blue); font-weight: 600; text-decoration: none;">Register Now</a>
            </p>

            <!-- Footer -->
            <div class="footer">
                Powered by <strong>Design by Kartik Bhalodiya.</strong>
            </div>
        </div>
    </div>

    <!-- Google Translate (Hidden but functional) -->
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <div id="google_translate_element" style="display:none;"></div>
    <script>
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'hi,gu,en',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
                autoDisplay: false
            }, 'google_translate_element');
        }
        
        // Password visibility toggle
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('togglePassword');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }
    </script>
</body>
</html>
