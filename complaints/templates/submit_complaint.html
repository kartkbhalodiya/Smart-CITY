<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Complaint - Smart City</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: #f5f7fa;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 800;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 8px 15px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .form-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #2d3436;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #dee2e6;
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #2c3e50;
            box-shadow: 0 0 0 3px rgba(44, 62, 80, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .subcategory-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .subcategory-card {
            padding: 15px;
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
        }

        .subcategory-card:hover {
            background: #e9ecef;
        }

        .subcategory-card.active {
            background: #2c3e50;
            color: #fff;
            border-color: #2c3e50;
        }

        .dynamic-fields {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .dynamic-fields.show {
            display: block;
        }

        .btn {
            padding: 14px 25px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            justify-content: center;
        }

        .btn-primary {
            background: #2c3e50;
            color: #fff;
            width: 100%;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .location-btn {
            background: #10b981;
            color: #fff;
            width: 100%;
            margin-bottom: 15px;
        }

        .location-info {
            background: #e9ecef;
            padding: 15px;
            border-radius: 10px;
            font-size: 13px;
            display: none;
        }

        .location-info.show {
            display: block;
        }

        .file-input {
            padding: 10px !important;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .checkbox-group input[type="checkbox"] {
            width: auto;
        }

        @media (max-width: 480px) {
            .subcategory-grid {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 18px;
            }
        }

        .spinner {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #fff;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <script src="/static/js/comprehensive_translations.js"></script>
    <div class="container">
        <div class="header">
            <h1 id="pageTitle">Submit Complaint</h1>
            <a href="{% url 'user_dashboard' %}" class="back-btn">
                <i class="fa-solid fa-arrow-left"></i> Back
            </a>
        </div>

        <form method="post" enctype="multipart/form-data" id="complaintForm">
            {% csrf_token %}
            
            <div class="form-card">
                <div class="form-group">
                    <label>Main Category</label>
                    <select name="complaint_type" id="mainCategory" required {% if initial_type %}disabled{% endif %}>
                        <option value="">Select Category</option>
                        {% if has_managed_categories %}
                            {% for cat in managed_categories %}
                                <option value="{{ cat.key }}" {% if initial_type == cat.key %}selected{% endif %}>{{ cat.name }}</option>
                            {% endfor %}
                        {% else %}
                            {% for cat_id, cat_name in fallback_complaint_types %}
                                <option value="{{ cat_id }}" {% if initial_type == cat_id %}selected{% endif %}>{{ cat_name }}</option>
                            {% endfor %}
                        {% endif %}
                    </select>
                    {% if initial_type %}
                    <input type="hidden" name="complaint_type" value="{{ initial_type }}">
                    {% endif %}
                </div>

                <div class="form-group" id="subcategorySection" style="display: none;">
                    <label>Subcategory</label>
                    <select id="subcategoryDropdown" class="form-control">
                        <option value="">Select Subcategory</option>
                    </select>
                    <input type="hidden" name="subcategory" id="subcategoryValue">
                </div>

                <div id="dynamicFields" class="dynamic-fields"></div>
            </div>

            <div class="form-card">
                <h3 style="margin-bottom: 15px; font-size: 16px;">Common Details</h3>
                
                <div class="form-group">
                    <label>Complaint Title</label>
                    <input type="text" name="title" placeholder="Brief title of your complaint" required>
                </div>

                <div class="form-group">
                    <label>Detailed Description</label>
                    <textarea name="description" placeholder="Provide detailed information..." required></textarea>
                </div>

                <div class="form-group">
                    <label>Upload Evidence (Optional)</label>
                    <input type="file" name="media" class="file-input" accept="image/*,video/*,.pdf" multiple>
                    <small style="color: #6c757d;">Max 10MB per file. Formats: JPG, PNG, PDF, MP4</small>
                </div>
            </div>

            <div class="form-card">
                <h3 style="margin-bottom: 15px; font-size: 16px;">Location Details</h3>
                
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px;">
                    <button type="button" class="btn" style="background: #10b981; color: #fff; padding: 12px;" onclick="autoDetectLocation()">
                        <i class="fa-solid fa-location-crosshairs"></i>
                        Auto Detect
                    </button>
                    <button type="button" class="btn" style="background: #3b82f6; color: #fff; padding: 12px;" onclick="selectOnMap()">
                        <i class="fa-solid fa-map-marked-alt"></i>
                        Select on Map
                    </button>
                    <button type="button" class="btn" style="background: #6366f1; color: #fff; padding: 12px;" onclick="manualEntry()">
                        <i class="fa-solid fa-pen"></i>
                        Manual Entry
                    </button>
                </div>

                <div id="mapContainer" style="display: none; margin-bottom: 20px;">
                    <div id="map" style="height: 400px; width: 100%; border-radius: 10px; border: 1px solid #dee2e6;"></div>
                    <button type="button" class="btn location-btn" onclick="confirmMapLocation()" style="margin-top: 10px;">
                        <i class="fa-solid fa-check"></i>
                        Confirm Location
                    </button>
                </div>

                <div class="form-group">
                    <label>GPS Coordinates</label>
                    <input type="text" id="coordinatesDisplay" placeholder="Coordinates will appear here" readonly style="background: #f8f9fa; cursor: not-allowed;">
                </div>

                <div class="form-group">
                    <label>State</label>
                    <select name="state" id="stateInput" required>
                        <option value="Gujarat">Gujarat</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>City / District</label>
                    <select name="city" id="cityInput" required onchange="document.getElementById('districtInput').value = this.value">
                        <option value="">Select City</option>
                        <option value="Jamnagar">Jamnagar</option>
                        <option value="Rajkot">Rajkot</option>
                        <option value="Ahmedabad">Ahmedabad</option>
                        <option value="Vadodara">Vadodara</option>
                    </select>
                    <input type="hidden" name="district" id="districtInput">
                </div>

                <div class="form-group">
                    <label>Area / Locality</label>
                    <input type="text" name="area" id="areaInput" placeholder="Enter area">
                </div>

                <div class="form-group">
                    <label>Road Name</label>
                    <input type="text" name="road" id="roadInput" placeholder="Enter road name">
                </div>

                <div class="form-group">
                    <label>Landmark</label>
                    <input type="text" name="landmark" id="landmarkInput" placeholder="Enter landmark">
                </div>

                <div class="form-group">
                    <label>Pin Code</label>
                    <input type="text" name="pincode" id="pincodeInput" placeholder="Enter pincode" pattern="[0-9]{6}" required>
                </div>

                <div class="form-group">
                    <label>Full Address</label>
                    <textarea name="address" id="addressInput" placeholder="Complete address" rows="3" required></textarea>
                </div>

                <input type="hidden" name="latitude" id="latitudeInput">
                <input type="hidden" name="longitude" id="longitudeInput">
            </div>

            <div class="form-card">
                <h3 style="margin-bottom: 15px; font-size: 16px;">Your Information</h3>
                
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="full_name" value="{% if user.is_authenticated %}{{ user.get_full_name }}{% endif %}" required>
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" name="phone" value="{% if user.is_authenticated %}{{ user.citizenprofile.mobile_no }}{% endif %}" pattern="[0-9]{10}" required>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" value="{% if user.is_authenticated %}{{ user.email }}{% endif %}" required>
                </div>

                <div class="form-group">
                    <label>Complaint Priority</label>
                    <div style="display: flex; gap: 10px; margin-top: 10px;">
                        <button type="button" class="priority-btn" data-priority="high" onclick="setPriority('high')" style="flex: 1; padding: 12px; border: 2px solid #ef4444; background: #fee2e2; color: #dc2626; border-radius: 10px; font-weight: 600; cursor: pointer;">
                            <i class="fa-solid fa-circle-exclamation"></i> HIGH
                        </button>
                        <button type="button" class="priority-btn" data-priority="medium" onclick="setPriority('medium')" style="flex: 1; padding: 12px; border: 2px solid #f59e0b; background: #fef3c7; color: #d97706; border-radius: 10px; font-weight: 600; cursor: pointer;">
                            <i class="fa-solid fa-triangle-exclamation"></i> MEDIUM
                        </button>
                        <button type="button" class="priority-btn" data-priority="normal" onclick="setPriority('normal')" style="flex: 1; padding: 12px; border: 2px solid #10b981; background: #d1fae5; color: #059669; border-radius: 10px; font-weight: 600; cursor: pointer;">
                            <i class="fa-solid fa-circle-check"></i> NORMAL
                        </button>
                    </div>
                    <input type="hidden" name="priority" id="priorityInput" value="normal" required>
                </div>

                <div class="form-group">
                    <label>Preferred Contact Method</label>
                    <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px;">
                        <label style="display: flex; align-items: center; gap: 8px; padding: 10px 15px; background: #f8f9fa; border: 2px solid #dee2e6; border-radius: 10px; cursor: pointer; margin: 0;">
                            <input type="checkbox" name="contact_phone" value="phone" style="width: auto;">
                            <span><i class="fa-solid fa-phone"></i> Phone</span>
                        </label>
                        <label style="display: flex; align-items: center; gap: 8px; padding: 10px 15px; background: #f8f9fa; border: 2px solid #dee2e6; border-radius: 10px; cursor: pointer; margin: 0;">
                            <input type="checkbox" name="contact_email" value="email" style="width: auto;">
                            <span><i class="fa-solid fa-envelope"></i> Email</span>
                        </label>
                        <label style="display: flex; align-items: center; gap: 8px; padding: 10px 15px; background: #f8f9fa; border: 2px solid #dee2e6; border-radius: 10px; cursor: pointer; margin: 0;">
                            <input type="checkbox" name="contact_sms" value="sms" style="width: auto;">
                            <span><i class="fa-solid fa-message"></i> SMS</span>
                        </label>
                    </div>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" name="anonymous" id="anonymous">
                    <label for="anonymous" style="margin: 0; text-transform: none;">Submit as Anonymous</label>
                </div>
            </div>

            <button type="submit" class="btn btn-primary">
                <i class="fa-solid fa-paper-plane"></i>
                Submit Complaint
            </button>
        </form>
    </div>

    <!-- Load Leaflet (Free Map) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        let map, marker;
        let mapLoaded = true;

        // Wait for DOM to be ready
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM loaded, Leaflet ready');
        });

        function setPriority(level) {
            document.getElementById('priorityInput').value = level;
            document.querySelectorAll('.priority-btn').forEach(btn => {
                if (btn.dataset.priority === level) {
                    if (level === 'high') {
                        btn.style.background = '#dc2626';
                        btn.style.color = '#fff';
                    } else if (level === 'medium') {
                        btn.style.background = '#f59e0b';
                        btn.style.color = '#fff';
                    } else {
                        btn.style.background = '#10b981';
                        btn.style.color = '#fff';
                    }
                } else {
                    const priority = btn.dataset.priority;
                    if (priority === 'high') {
                        btn.style.background = '#fee2e2';
                        btn.style.color = '#dc2626';
                    } else if (priority === 'medium') {
                        btn.style.background = '#fef3c7';
                        btn.style.color = '#d97706';
                    } else {
                        btn.style.background = '#d1fae5';
                        btn.style.color = '#059669';
                    }
                }
            });
        }

        function autoDetectLocation() {
            const btn = event.target;
            btn.innerHTML = '<div class="spinner"></div>Detecting...';
            btn.disabled = true;
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    
                    document.getElementById('latitudeInput').value = lat;
                    document.getElementById('longitudeInput').value = lng;
                    document.getElementById('coordinatesDisplay').value = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;

                    await updateAddressFromCoordinates(lat, lng);
                    alert('Location detected successfully!');
                    
                    btn.innerHTML = '<i class="fa-solid fa-location-crosshairs"></i> Auto Detect';
                    btn.disabled = false;
                }, (error) => {
                    alert('Please enable location services and try again.');
                    btn.innerHTML = '<i class="fa-solid fa-location-crosshairs"></i> Auto Detect';
                    btn.disabled = false;
                });
            }
        }

        function selectOnMap() {
            const btn = event.target;
            if (!mapLoaded) {
                alert('Map is still loading, please wait a moment and try again.');
                return;
            }
            
            btn.innerHTML = '<div class="spinner"></div>Loading Map...';
            btn.disabled = true;
            
            const mapContainer = document.getElementById('mapContainer');
            mapContainer.style.display = 'block';
            
            if (!map) {
                setTimeout(() => {
                    initMap();
                    btn.innerHTML = '<i class="fa-solid fa-map-marked-alt"></i> Select on Map';
                    btn.disabled = false;
                }, 500);
            } else {
                btn.innerHTML = '<i class="fa-solid fa-map-marked-alt"></i> Select on Map';
                btn.disabled = false;
            }
        }

        function initMap() {
            try {
                // Get user's current location first
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition((position) => {
                        const lat = position.coords.latitude;
                        const lng = position.coords.longitude;
                        
                        document.getElementById('latitudeInput').value = lat;
                        document.getElementById('longitudeInput').value = lng;
                        document.getElementById('coordinatesDisplay').value = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
                        
                        // Initialize Leaflet map
                        map = L.map('map').setView([lat, lng], 16);
                        
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                            attribution: '© OpenStreetMap contributors'
                        }).addTo(map);
                        
                        marker = L.marker([lat, lng], {
                            draggable: true
                        }).addTo(map);
                        
                        marker.on('dragend', function() {
                            const pos = marker.getLatLng();
                            const newLat = pos.lat;
                            const newLng = pos.lng;
                            
                            document.getElementById('latitudeInput').value = newLat;
                            document.getElementById('longitudeInput').value = newLng;
                            document.getElementById('coordinatesDisplay').value = `${newLat.toFixed(6)}, ${newLng.toFixed(6)}`;
                            updateAddressFromCoordinates(newLat, newLng);
                        });
                        
                        map.on('click', function(e) {
                            marker.setLatLng(e.latlng);
                            const newLat = e.latlng.lat;
                            const newLng = e.latlng.lng;
                            
                            document.getElementById('latitudeInput').value = newLat;
                            document.getElementById('longitudeInput').value = newLng;
                            document.getElementById('coordinatesDisplay').value = `${newLat.toFixed(6)}, ${newLng.toFixed(6)}`;
                            updateAddressFromCoordinates(newLat, newLng);
                        });
                    }, () => {
                        // Fallback to default location (Delhi) if geolocation fails
                        const defaultLat = 28.6139;
                        const defaultLng = 77.2090;
                        
                        map = L.map('map').setView([defaultLat, defaultLng], 12);
                        
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                            attribution: '© OpenStreetMap contributors'
                        }).addTo(map);
                        
                        marker = L.marker([defaultLat, defaultLng], {
                            draggable: true
                        }).addTo(map);
                        
                        marker.on('dragend', function() {
                            const pos = marker.getLatLng();
                            const newLat = pos.lat;
                            const newLng = pos.lng;
                            
                            document.getElementById('latitudeInput').value = newLat;
                            document.getElementById('longitudeInput').value = newLng;
                            document.getElementById('coordinatesDisplay').value = `${newLat.toFixed(6)}, ${newLng.toFixed(6)}`;
                            updateAddressFromCoordinates(newLat, newLng);
                        });
                        
                        map.on('click', function(e) {
                            marker.setLatLng(e.latlng);
                            const newLat = e.latlng.lat;
                            const newLng = e.latlng.lng;
                            
                            document.getElementById('latitudeInput').value = newLat;
                            document.getElementById('longitudeInput').value = newLng;
                            document.getElementById('coordinatesDisplay').value = `${newLat.toFixed(6)}, ${newLng.toFixed(6)}`;
                            updateAddressFromCoordinates(newLat, newLng);
                        });
                    });
                } else {
                    // Fallback if geolocation not supported
                    const fallbackLat = 28.6139;
                    const fallbackLng = 77.2090;
                    
                    map = L.map('map').setView([fallbackLat, fallbackLng], 12);
                    
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '© OpenStreetMap contributors'
                    }).addTo(map);
                    
                    marker = L.marker([fallbackLat, fallbackLng], {
                        draggable: true
                    }).addTo(map);
                    
                    marker.on('dragend', function() {
                        const pos = marker.getLatLng();
                        const newLat = pos.lat;
                        const newLng = pos.lng;
                        
                        document.getElementById('latitudeInput').value = newLat;
                        document.getElementById('longitudeInput').value = newLng;
                        document.getElementById('coordinatesDisplay').value = `${newLat.toFixed(6)}, ${newLng.toFixed(6)}`;
                        updateAddressFromCoordinates(newLat, newLng);
                    });
                    
                    map.on('click', function(e) {
                        marker.setLatLng(e.latlng);
                        const newLat = e.latlng.lat;
                        const newLng = e.latlng.lng;
                        
                        document.getElementById('latitudeInput').value = newLat;
                        document.getElementById('longitudeInput').value = newLng;
                        document.getElementById('coordinatesDisplay').value = `${newLat.toFixed(6)}, ${newLng.toFixed(6)}`;
                        updateAddressFromCoordinates(newLat, newLng);
                    });
                }
            } catch (error) {
                console.error('Map initialization error:', error);
                alert('Failed to load map: ' + error.message);
            }
        }

        async function updateAddressFromCoordinates(lat, lng) {
            try {
                console.log('Fetching address for:', lat, lng);
                const response = await fetch(`/api/reverse-geocode/?lat=${lat}&lng=${lng}`);
                const data = await response.json();
                console.log('Address response:', data);
                
                if (data.results && data.results[0]) {
                    const addr = data.results[0];
                    
                    // Fill pincode
                    let pincode = addr.pincode || addr.pin || addr.postal_code || addr.postcode || '';
                    
                    // Extra fallback: try to extract pincode from formatted address if still empty
                    if (!pincode && (addr.formatted_address || addr.address)) {
                        const fullAddr = addr.formatted_address || addr.address;
                        const pinMatch = fullAddr.match(/\b\d{6}\b/);
                        if (pinMatch) pincode = pinMatch[0];
                    }
                    document.getElementById('pincodeInput').value = pincode;
                    
                    console.log('Only pincode filled successfully');
                } else {
                    console.log('No address results found');
                }
            } catch (error) {
                console.error('Address update failed:', error);
            }
        }

        function manualEntry() {
            document.getElementById('mapContainer').style.display = 'none';
        }

        async function confirmMapLocation() {
            try {
                console.log('confirmMapLocation called');
                
                // Get coordinates directly from marker position
                let lat, lng;
                
                if (marker) {
                    console.log('Getting coordinates from Leaflet marker');
                    const pos = marker.getLatLng();
                    lat = pos.lat;
                    lng = pos.lng;
                    
                    // Update the input fields
                    document.getElementById('latitudeInput').value = lat;
                    document.getElementById('longitudeInput').value = lng;
                    document.getElementById('coordinatesDisplay').value = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
                } else {
                    console.log('No marker found, getting from input fields');
                    lat = document.getElementById('latitudeInput').value;
                    lng = document.getElementById('longitudeInput').value;
                }
                
                console.log('Final coordinates:', lat, lng);
                
                if (lat && lng) {
                    await updateAddressFromCoordinates(lat, lng);
                    document.getElementById('mapContainer').style.display = 'none';

        mainCategory.addEventListener('change', function() {

            if (category && effectiveSubcategories[category]) {
                subcategorySection.style.display = 'block';
                subcategoryDropdown.innerHTML = '<option value="">Select Subcategory</option>';
                
                effectiveSubcategories[category].forEach(sub => {
                    const option = document.createElement('option');
                    option.value = sub;
                    option.textContent = sub;
                    subcategoryDropdown.appendChild(option);
                });

                pageTitle.textContent = category.charAt(0).toUpperCase() + category.slice(1) + ' Complaint';
                
                // Apply translation to subcategory options
                const savedLang = localStorage.getItem('selectedLanguage') || 'en';
                if (typeof translatePageComprehensive === 'function') {
                    translatePageComprehensive(savedLang);

            } else {
                subcategorySection.style.display = 'none';
            }
            dynamicFields.classList.remove('show');
            dynamicFields.innerHTML = '';
        });

        subcategoryDropdown.addEventListener('change', function() {
            const sub = this.value;
            const categoryKey = mainCategory.value;
            subcategoryValue.value = sub;
            const dynamicKey = `${categoryKey}::${sub}`;
            const selectedFields = effectiveDynamicFields[dynamicKey] || effectiveDynamicFields[sub];

            if (sub && selectedFields) {
                dynamicFields.innerHTML = '<h4 style="margin-bottom: 15px; font-size: 14px;">Additional Details</h4>';
                selectedFields.forEach(field => {
                    const div = document.createElement('div');
                    div.className = 'form-group';
                    const fieldName = field.name || field;
                    const fieldType = field.type || 'text';
                    const fieldId = field.id ? `field_${field.id}` : `field_${fieldName.replace(/\s+/g, '_').toLowerCase().replace(/[()/?]/g, '')}`;
                    const requiredAttr = field.required ? 'required' : '';
                    
                    if (fieldType === 'select' && field.options) {
                        div.innerHTML = `
                            <label>${fieldName}</label>
                            <select name="${fieldId}" ${requiredAttr}>
                                <option value="">Select ${fieldName}</option>
                                ${field.options.map(opt => `<option value="${opt}">${opt}</option>`).join('')}
                            </select>
                        `;
                    } else {
                        div.innerHTML = `
                            <label>${fieldName}</label>
                            ${fieldType === 'textarea'
                                ? `<textarea name="${fieldId}" placeholder="Enter ${fieldName.toLowerCase()}" ${requiredAttr}></textarea>`
                                : `<input type="${fieldType}" name="${fieldId}" placeholder="Enter ${fieldName.toLowerCase()}" ${requiredAttr}>`
                            }
                        `;
                    }
                    dynamicFields.appendChild(div);
                });
                dynamicFields.classList.add('show');
                
                // Apply translation to new elements
                setTimeout(() => {
                    translateDynamicContent();
                }, 100);
            } else {
                dynamicFields.classList.remove('show');
                dynamicFields.innerHTML = '';
            }
        });

                'No': 'ના'
            }
        };

        function translatePage(lang) {
            if (lang === 'en') return;
            
            const langTranslations = translations[lang];
            if (!langTranslations) return;

            // Translate all text elements
            document.querySelectorAll('*').forEach(element => {
                // Skip elements with children to avoid overwriting
                if (element.children.length === 0) {
                    const text = element.textContent.trim();
                    if (text && langTranslations[text]) {
                        element.textContent = langTranslations[text];
                    }
                }
                
                // Translate placeholders
                if (element.placeholder && langTranslations[element.placeholder]) {
                    element.placeholder = langTranslations[element.placeholder];
                }
                
                // Translate option values
                if (element.tagName === 'OPTION' && langTranslations[element.textContent.trim()]) {
                    element.textContent = langTranslations[element.textContent.trim()];
                }
            });
        }

        // Load saved language on page load
        window.addEventListener('load', () => {
            const savedLang = localStorage.getItem('selectedLanguage') || 'en';
            if (typeof translatePageComprehensive === 'function') {
                translatePageComprehensive(savedLang);
            }
        });
    </script>
</body>
</html>
