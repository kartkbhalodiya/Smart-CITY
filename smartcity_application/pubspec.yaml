name: janhelp
description: Smart City Complaint Management System - Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  lottie: ^2.7.0
  animations: ^2.0.11
  photo_view: ^0.14.0

  # State Management
  provider: ^6.1.1

  # API & Network
  http: ^1.1.0
  dio: ^5.4.0

  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^10.0.0
  path_provider: ^2.1.1

  # Forms & Validation
  flutter_form_builder: ^10.3.0+2

  # Image & Video
  image_picker: ^1.0.5
  video_player: ^2.8.1
  image_cropper: ^8.0.0
  file_picker: ^8.0.0

  # Maps & Location
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^10.1.0
  geocoding: ^2.1.1

  # Notifications (Supabase)
  supabase_flutter: ^2.0.0

  # Utils
  intl: ^0.20.2
  url_launcher: ^6.2.2
  share_plus: ^7.2.1
  permission_handler: ^11.0.1
  flutter_local_notifications: ^17.2.2
  flutter_tts: ^4.0.2
  audioplayers: ^6.1.0
  speech_to_text: ^7.3.0
  record: ^6.2.0
  flutter_audio_capture: ^1.1.12
  flutter_pcm_sound: ^3.3.3
  volume_controller: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.9

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/logo.png
  android: true
  ios: true
  fullscreen: false
  android_gravity: center
  ios_content_mode: center

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png
    - assets/images/login_bg.jpg
    - assets/images/janhelp_icon.png
    - web/favicon.png
